name: artifact-center

x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: '3'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: artifact
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 deploy/.env 中设置 POSTGRES_PASSWORD}
      POSTGRES_DB: artifact_center
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U artifact -d artifact_center']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    logging: *default-logging
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgres://artifact:${POSTGRES_PASSWORD}@postgres:5432/artifact_center
      JWT_SECRET: ${JWT_SECRET:?请在 deploy/.env 中设置 JWT_SECRET}
      BOOTSTRAP_ADMIN_NAME: ${ADMIN_NAME:-}
      BOOTSTRAP_ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      BOOTSTRAP_ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      STORAGE_PATH: /data/artifacts
      CORS_ORIGIN: ${APP_ORIGIN:-http://localhost:8080}
      SLOW_REQUEST_MS: ${SLOW_REQUEST_MS:-500}
    volumes:
      - artifact_files:/data/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3001/health >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    ports:
      - '${APP_PORT:-8080}:80'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  postgres_data:
  artifact_files:
