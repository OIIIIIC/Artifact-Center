map $uri $diagnostic_uri {
    ~^(?<share_prefix>/api/public/shares)/[^/]+(?<share_suffix>/.*)?$ $share_prefix/:token$share_suffix;
    default $uri;
}

log_format artifact_json escape=json
    '{"timestamp":"$time_iso8601",'
    '"event":"nginx_request",'
    '"requestId":"$sent_http_x_request_id",'
    '"method":"$request_method",'
    '"path":"$diagnostic_uri",'
    '"status":$status,'
    '"requestTime":"$request_time",'
    '"upstreamConnectTime":"$upstream_connect_time",'
    '"upstreamHeaderTime":"$upstream_header_time",'
    '"upstreamResponseTime":"$upstream_response_time"}';

server {
    listen 80;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;
    access_log /var/log/nginx/access.log artifact_json;

    # 制品可能很大；大小限制由应用策略控制，而不是由反向代理意外截断。
    client_max_body_size 0;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://api:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;
    add_header X-Frame-Options SAMEORIGIN always;
}
