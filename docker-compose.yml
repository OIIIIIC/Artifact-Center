# Artifact Center — local infrastructure
# Usage: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: artifact-center-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: artifact
      POSTGRES_PASSWORD: artifact
      POSTGRES_DB: artifact_center
    volumes:
      - ac_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U artifact -d artifact_center']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ac_pg_data:
